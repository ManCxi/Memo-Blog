# Shared hardening for reverse-proxied services.
limit_conn per_ip_conn 20;
limit_req zone=per_ip burst=60;
limit_req_status 429;
limit_conn_status 429;
client_body_timeout 15s;
client_header_timeout 15s;
keepalive_timeout 30s;
send_timeout 30s;
ignore_invalid_headers on;

if ($block_bad_ua) {
    return 444;
}

if ($query_string ~* "(?:rest_route=/wp/v2/users/?|tagstpl=|file_put_contents|eval-stdin\.php|phpinfo(?:\.php)?)") {
    return 444;
}

# Hide dotfiles and repository metadata, but keep ACME validation available.
location ~ /\.(?!well-known/acme-challenge/) {
    return 404;
}

# Drop common CMS and middleware scanners before they reach the app.
location ~* ^/(?:wp-admin|wp-content|wp-includes)(?:/|$) {
    return 444;
}

location ~* ^/(?:wp-login\.php|xmlrpc\.php|uploadify\.php|tinyfilemanager\.php|alfashell\.php|manager/html|druid(?:/|$)|actuator(?:/|$)|console(?:/|$)|server-status(?:/|$)|phpmyadmin(?:/|$)|mysql(?:/|$)|cgi-bin(?:/|$)|boaform(?:/|$)|modules/mod_simplefileuploadv1\.3(?:/|$)|vendor/phpunit(?:/|$)|configuration/info\.xml) {
    return 444;
}

location ~* (?:\.\.|%2e%2e) {
    return 444;
}

# This stack does not serve executable scripts directly from Nginx.
location ~* \.(?:php[0-9]?|phtml|phar|asp|aspx|jsp|jspx|cgi|pl|py|sh)$ {
    return 444;
}
