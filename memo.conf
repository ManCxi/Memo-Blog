server {
    listen 443 ssl;
    server_name mancxi.cn www.mancxi.cn;

    if ($host !~ ^(mancxi\.cn|www\.mancxi\.cn)$) {
        return 444;
    }

    deny 20.151.201.236;
    deny 40.115.137.81;
    deny 4.232.184.93;

    include /etc/nginx/snippets/common-security.conf;
    
    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml font/opentype font/truetype font/ttf font/woff font/woff2 appearance/none;

    location ^~ /admin/ {
        limit_req zone=per_ip_admin burst=20;
        client_max_body_size 16m;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|webp|svg)$ {
        # 允许静态资源有更大的突发请求量 (Ctrl+F5)
        limit_req zone=per_ip burst=200;
        
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        access_log off;
    }

    location / {
        limit_req zone=per_ip burst=80;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    ssl_certificate /etc/letsencrypt/live/mancxi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mancxi.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name mancxi.cn www.mancxi.cn;

    if ($host !~ ^(mancxi\.cn|www\.mancxi\.cn)$) {
        return 444;
    }

    return 301 https://$host$request_uri;
}
